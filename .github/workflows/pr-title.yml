name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commit-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const conventionalCommitPattern =
              /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+/;

            if (!conventionalCommitPattern.test(title)) {
              core.setFailed(
                [
                  `PR title "${title}" does not follow Conventional Commits.`,
                  'Use a title like "feat(ui): add review filters" or "fix: handle missing repo path".',
                ].join(" ")
              );
            }
